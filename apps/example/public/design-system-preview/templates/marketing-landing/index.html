<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Marketing landing page" description="Leida's public landing page - hero, how-it-works, live cost calculator, pricing, FAQ and waitlist, fully branded and editable." -->
<helmet>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="./ds-base.js"></script>
  <script src="../../ui_kits/marketing-site/MarketingSite.jsx"></script>
  <script>
    (function mount(){
      var el = document.getElementById("leida-landing");
      if (el && window.ReactDOM && window.MarketingSite) {
        if (!el.__leidaRoot) el.__leidaRoot = ReactDOM.createRoot(el);
        el.__leidaRoot.render(React.createElement(window.MarketingSite));
      } else { setTimeout(mount, 30); }
    })();
  </script>
</helmet>
<div id="leida-landing" style="min-height:100vh;background:#f7f7f4"></div>
</x-dc>
</body>
</html>
