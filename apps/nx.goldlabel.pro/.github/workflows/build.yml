name: NX° Continuous Integration

on:
  pull_request:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter ./apps/nx.goldlabel.pro lint

      - name: Typecheck
        run: pnpm --filter ./apps/nx.goldlabel.pro typecheck

      - name: Test
        run: pnpm --filter ./apps/nx.goldlabel.pro test --runInBand

      - name: Build
        run: pnpm --filter ./apps/nx.goldlabel.pro build
