<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--surface-page); padding: 26px; }
  .grid { display: flex; gap: 16px; align-items: stretch; }
  .cell { flex: 1; background: var(--nx-paper); border: 1px solid var(--border-hairline); border-radius: var(--radius-xl); padding: 22px; display: flex; flex-direction: column; gap: 16px; align-items: flex-start; justify-content: center; }
  .cell.ink { background: var(--nx-ink); border: 0; }
  .lbl { font-family: var(--font-mono); font-size: 0.54rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--nx-muted); }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Logo, StarMark } = window.NXDesignSystem_ab1d28;
    function Demo() {
      return (
        <div className="grid">
          <div className="cell">
            <span className="lbl">Wordmark</span>
            <Logo height={40} />
            <span className="lbl">Sparkle</span>
            <div style={{display:"flex",gap:14,alignItems:"center"}}>
              <StarMark size={30} tone="ink" />
              <StarMark size={30} tone="clay" />
            </div>
          </div>
          <div className="cell ink">
            <span className="lbl" style={{color:"var(--nx-oat)"}}>On ink</span>
            <Logo height={38} tone="offwhite" />
            <StarMark size={28} tone="offwhite" />
          </div>
          <div className="cell">
            <span className="lbl">Eyebrow class</span>
            <span className="eyebrow">Client aftercare</span>
            <span className="eyebrow" style={{color:"var(--nx-muted)"}}>Your products</span>
            <span className="eyebrow" style={{color:"var(--nx-muted)"}}>Morning &amp; evening</span>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
