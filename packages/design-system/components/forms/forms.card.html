<!-- @dsCard group="Components" viewport="700x360" name="Forms - Button, Input, Slider, Toggle" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--surface-page); padding: 28px; }
  .wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 26px 34px; max-width: 640px; }
  .lbl { font-family: var(--font-mono); font-size: 0.54rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--nx-muted); margin-bottom: 12px; display: block; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Button, Input, RangeSlider, SegmentedToggle, StarMark } = window.NXDesignSystem_ab1d28;
    function Demo() {
      const [tab, setTab] = React.useState("am");
      const [n, setN] = React.useState(30);
      return (
        <div className="wrap">
          <div style={{gridColumn:"1 / -1"}}>
            <span className="lbl">Buttons</span>
            <div className="row">
              <Button>Become a member</Button>
              <Button variant="ghost">How it works</Button>
              <Button variant="quiet" size="sm">Buy</Button>
              <Button disabled>Sold out</Button>
              <Button icon={<StarMark size={13} tone="offwhite" />}>Start</Button>
            </div>
          </div>
          <div>
            <span className="lbl">Input</span>
            <Input label="Email" type="email" placeholder="you@clinic.com" />
          </div>
          <div>
            <span className="lbl">Segmented toggle</span>
            <SegmentedToggle
              options={[{value:"am",label:"Morning"},{value:"pm",label:"Evening"}]}
              value={tab} onChange={setTab} />
          </div>
          <div style={{gridColumn:"1 / -1"}}>
            <span className="lbl">Range slider</span>
            <RangeSlider label="Clients / week" min={5} max={80} value={n}
              onChange={setN} />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
