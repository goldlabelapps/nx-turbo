<!-- @dsCard group="Colors" viewport="700x150" name="Grounds" subtitle="Parchment & paper - the pages everything sits on" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--leida-oat); padding: 20px; }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; height: 108px; border-radius: var(--radius-lg); display: flex; flex-direction: column; justify-content: flex-end; padding: 14px; border: 1px solid var(--border-hairline); }
  .sw span { font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.04em; text-transform: uppercase; color: var(--leida-ink); }
  .sw small { font-family: var(--font-mono); font-size: 0.56rem; color: var(--leida-muted); margin-top: 3px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--leida-parchment)"><span>Parchment</span><small>#f7f7f4 · page</small></div>
    <div class="sw" style="background:var(--leida-paper)"><span>Paper</span><small>#fbfaf7 · raised</small></div>
    <div class="sw" style="background:var(--leida-tile)"><span>Tile</span><small>rgba white .72</small></div>
  </div>
</body>
</html>
