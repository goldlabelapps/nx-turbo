<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals" subtitle="Warm, low-chroma inks from near-black to taupe" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 20px; }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-card); }
  .sw { flex: 1; height: 108px; display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; }
  .sw span { font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.04em; text-transform: uppercase; }
  .sw small { font-family: var(--font-mono); font-size: 0.56rem; opacity: 0.7; margin-top: 3px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--leida-ink);color:#f7f7f4"><span>Ink</span><small>#1a1814</small></div>
    <div class="sw" style="background:var(--leida-dusty);color:#f7f7f4"><span>Dusty</span><small>#2c2c2a</small></div>
    <div class="sw" style="background:var(--leida-body);color:#f7f7f4"><span>Body</span><small>#3a3530</small></div>
    <div class="sw" style="background:var(--leida-sign);color:#f7f7f4"><span>Sign</span><small>#574f43</small></div>
    <div class="sw" style="background:var(--leida-muted);color:#1a1814"><span>Muted</span><small>#9a9080</small></div>
    <div class="sw" style="background:var(--leida-oat);color:#1a1814"><span>Oat</span><small>#cfc8bd</small></div>
  </div>
</body>
</html>
