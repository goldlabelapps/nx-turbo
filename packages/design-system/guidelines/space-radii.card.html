<!-- @dsCard group="Spacing" viewport="700x170" name="Corner radii" subtitle="Tiny-corner system, every corner sits at 3px" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 22px; display: flex; gap: 14px; align-items: flex-end; }
  .box { flex: 1; height: 92px; background: var(--nx-paper); border: 1px solid var(--border-hairline); box-shadow: var(--shadow-card); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 8px; }
  .box span { font-family: var(--font-mono); font-size: 0.56rem; letter-spacing: 0.04em; color: var(--nx-muted); text-transform: uppercase; }
  .pill { border-radius: var(--radius-pill); background: var(--nx-ink); }
  .pill span { color: var(--nx-oat); }
</style>
</head>
<body>
  <div class="box" style="border-radius:var(--radius-sm)"><span>sm 3</span></div>
  <div class="box" style="border-radius:var(--radius-lg)"><span>lg 3</span></div>
  <div class="box" style="border-radius:var(--radius-xl)"><span>xl 3</span></div>
  <div class="box" style="border-radius:var(--radius-2xl)"><span>2xl 3</span></div>
  <div class="box" style="border-radius:var(--radius-phone)"><span>phone 3</span></div>
  <div class="box pill"><span>pill 3</span></div>
</body>
</html>
