<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="4px base, opening up to a 108px section rhythm" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 22px 26px; display: flex; flex-direction: column; gap: 9px; }
  .r { display: flex; align-items: center; gap: 14px; }
  .bar { height: 14px; background: var(--leida-clay); border-radius: 4px; }
  .lab { font-family: var(--font-mono); font-size: 0.56rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--leida-muted); width: 88px; flex: 0 0 88px; }
</style>
</head>
<body>
  <div class="r"><div class="lab">2 · 8px</div><div class="bar" style="width:8px"></div></div>
  <div class="r"><div class="lab">4 · 16px</div><div class="bar" style="width:16px"></div></div>
  <div class="r"><div class="lab">6 · 26px</div><div class="bar" style="width:26px"></div></div>
  <div class="r"><div class="lab">8 · 46px</div><div class="bar" style="width:46px"></div></div>
  <div class="r"><div class="lab">10 · 70px</div><div class="bar" style="width:70px"></div></div>
  <div class="r"><div class="lab">12 · 108px</div><div class="bar" style="width:108px"></div></div>
</body>
</html>
