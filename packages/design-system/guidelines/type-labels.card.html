<!-- @dsCard group="Type" viewport="700x180" name="Labels - DM Mono" subtitle="All-caps, wide-tracked eyebrows, tags & buttons" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 24px 28px; display: flex; flex-direction: column; gap: 16px; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .eyebrow { margin: 0; }
  .label { font-family: var(--font-mono); font-size: 0.66rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--leida-body); }
  .btn { align-self: flex-start; font-family: var(--font-mono); font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 13px 24px; border-radius: var(--radius-pill); background: var(--leida-ink); color: var(--leida-parchment); }
  .tags { display: flex; gap: 8px; flex-wrap: wrap; }
  .tag { font-family: var(--font-mono); font-size: 0.56rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--leida-ink); background: var(--leida-tile); border-radius: 30px; padding: 6px 12px; }
  .meta { font-family: var(--font-mono); font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--leida-muted); }
</style>
</head>
<body>
  <div class="stack">
    <div class="eyebrow">Your products</div>
    <div class="tags">
      <span class="tag">Morning</span><span class="tag">Evening</span><span class="tag">New</span>
    </div>
    <div class="btn">Become a member</div>
  </div>
  <div class="meta">DM Mono · 400/500 · tracking .12–.22em · UPPERCASE</div>
</body>
</html>
