<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Client living page" description="The branded aftercare page a client receives - Morning/Evening routine, product steps and aftercare notes, shown in a phone frame. Personalise the clinic name and therapist signature." -->
<helmet>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="./ds-base.js"></script>
  <script src="../../ui_kits/aftercare-app/LivingPage.jsx"></script>
  <script>
    (function mount(){
      var el = document.getElementById("leida-living");
      if (el && window.ReactDOM && window.LivingPage) {
        if (!el.__leidaRoot) el.__leidaRoot = ReactDOM.createRoot(el);
        el.__leidaRoot.render(React.createElement(window.LivingPage));
      } else { setTimeout(mount, 30); }
    })();
  </script>
</helmet>
<div style="min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:30px;background:radial-gradient(130% 120% at 20% 0%, #e6dccb 0%, #c9b9a3 45%, #8f9384 100%)">
  <div style="width:390px;border-radius:46px;padding:13px;background:linear-gradient(160deg,#2a2620,#15130f);box-shadow:0 40px 80px rgba(26,24,20,0.32),0 4px 0 rgba(255,255,255,0.05) inset">
    <div style="border-radius:34px;overflow:hidden;background:#fbfaf7;height:740px;overflow-y:auto">
      <div id="leida-living"></div>
    </div>
  </div>
</div>
</x-dc>
</body>
</html>
