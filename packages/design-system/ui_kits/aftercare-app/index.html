<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Leida - Client living page</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { margin: 0; height: 100%; }
  body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 30px;
    background: radial-gradient(130% 120% at 20% 0%, #e6dccb 0%, #c9b9a3 45%, #8f9384 100%);
  }
  .phone {
    position: relative; width: 390px; border-radius: 46px; padding: 13px;
    background: linear-gradient(160deg, #2a2620, #15130f);
    box-shadow: var(--shadow-float), 0 4px 0 rgba(255,255,255,0.05) inset;
  }
  .phone::before {
    content: ""; position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 26px; background: #15130f; border-radius: 0 0 16px 16px; z-index: 3;
  }
  .screen {
    position: relative; border-radius: 34px; overflow: hidden; background: var(--leida-paper);
    height: 720px; overflow-y: auto; -webkit-overflow-scrolling: touch;
  }
  .screen::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
  <div class="phone"><div class="screen"><div id="root"></div></div></div>
  <script src="LivingPage.jsx"></script>
  <script type="text/babel">
    const LivingPage = window.LivingPage;
    ReactDOM.createRoot(document.getElementById("root")).render(<LivingPage />);
  </script>
</body>
</html>
