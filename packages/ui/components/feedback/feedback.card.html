<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<style>
  body { margin: 0; background: var(--surface-page); padding: 28px; }
  .lbl { font-family: var(--font-mono); font-size: 0.54rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--nx-muted); margin: 0 0 12px; display: block; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 24px; }
  .panel { background: var(--nx-paper); border: 1px solid var(--border-hairline); border-radius: var(--radius-xl); padding: 6px 22px; max-width: 620px; }
</style>

<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Badge, Tag, Accordion, Favicon } = window.NXDesignSystem_ab1d28;
    function Demo() {
      return (
        <div>
          <span className="lbl">Badges &amp; tags</span>
          <div className="row">
            <Badge>Most popular</Badge>
            <Badge tone="clay">New</Badge>
            <Badge tone="clay">Free trial</Badge>
            <Tag>Morning</Tag>
            <Tag variant="clay">New</Tag>
            <Tag variant="outline" icon={<Favicon size={10} />}>Serum</Tag>
          </div>
          <span className="lbl">Accordion</span>
          <div className="panel">
            <Accordion items={[
              { q: "Is it really faster than WhatsApp?", a: "Yes, one tap sends a living page that stays up to date, so you never re-type a routine again." },
              { q: "Do my clients need to download an app?", a: "No. The page saves to their home screen and opens like an app, with no store, login or friction." },
              { q: "Can I use my own branding?", a: "Every page carries your clinic's name and colours; NX sits quietly in the footer." },
            ]} />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
