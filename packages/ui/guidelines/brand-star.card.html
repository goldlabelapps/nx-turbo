<!-- @dsCard group="Brand" viewport="700x170" name="The sparkle mark" subtitle="Standalone eight-point star - app icon & accent glyph" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 20px; display: flex; gap: 16px; align-items: center; }
  .chip { width: 108px; height: 108px; border-radius: 3px; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-card); }
  .chip img { height: 48px; }
  .light { background: var(--nx-paper); border: 1px solid var(--border-hairline); }
  .clay { background: var(--nx-clay); }
  .ink { background: var(--nx-ink); }
  .note { flex: 1; }
  .note .eyebrow { margin: 0 0 8px; }
  .note p { font-size: 0.88rem; color: var(--text-body); margin: 0; max-width: 34ch; }
</style>
</head>
<body>
  <div class="chip light"><img src="../assets/logos/nx-star-black.svg" alt=""></div>
  <div class="chip clay"><img src="../assets/logos/nx-star-offwhite.svg" alt=""></div>
  <div class="chip ink"><img src="../assets/logos/nx-star-offwhite.svg" alt=""></div>
  <div class="note">
    <div class="eyebrow">The mark</div>
    <p>The sparkle stands alone as an app icon, favicon or quiet accent between sections.</p>
  </div>
</body>
</html>
