<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 24px 28px; }
  .quote { font-family: var(--font-serif); font-style: italic; font-size: 1.5rem; line-height: 1.3; color: var(--nx-ink); margin: 0 0 18px; max-width: 30ch; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 26px; }
  .do, .dont { font-size: 0.86rem; line-height: 1.5; }
  .k { font-family: var(--font-mono); font-size: 0.56rem; letter-spacing: 0.14em; text-transform: uppercase; display: block; margin-bottom: 6px; }
  .do .k { color: var(--nx-clay); }
  .dont .k { color: var(--nx-ash); }
  .do p, .dont p { margin: 0; color: var(--text-body); }
</style>
</head>
<body>
  <p class="quote">Built by a skin therapist, for skin therapists.</p>
  <div class="grid">
    <div class="do">
      <span class="k">We sound like</span>
      <p>Plain, warm, confident. Second person (“your clients”). Short, human sentences. Quietly proud, never salesy.</p>
    </div>
    <div class="dont">
      <span class="k">Not like</span>
      <p>Hype, jargon, exclamation stacks, or emoji. No “revolutionary,” no “game-changing,” no filler stats.</p>
    </div>
  </div>
</body>
</html>
