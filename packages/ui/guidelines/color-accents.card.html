<!-- @dsCard group="Colors" viewport="700x150" name="Accent - Clay" subtitle="Primary signal accent for highlights and calls-to-action" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 20px; }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; height: 108px; border-radius: var(--radius-lg); display: flex; flex-direction: column; justify-content: flex-end; padding: 14px; box-shadow: var(--shadow-card); }
  .sw span { font-family: var(--font-mono); font-size: 0.66rem; letter-spacing: 0.06em; text-transform: uppercase; color: #fff; }
  .sw small { font-family: var(--font-mono); font-size: 0.56rem; color: rgba(255,255,255,.8); margin-top: 3px; }
  .use { flex: 2.4; background: var(--nx-paper); border: 1px solid var(--border-hairline); }
  .use .eyebrow { margin-bottom: 8px; }
  .use p { font-size: 0.82rem; color: var(--text-body); margin: 0; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--nx-clay)"><span>Clay</span><small>#ff4d00</small></div>
    <div class="use" style="flex-direction:column;justify-content:center">
      <div class="eyebrow">Client aftercare</div>
      <p>Clay is now a strong signal color, used for eyebrows, marks, chevrons and key highlights against cooler ink and paper surfaces.</p>
    </div>
  </div>
</body>
</html>
