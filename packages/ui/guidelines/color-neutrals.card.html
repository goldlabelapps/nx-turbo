<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals" subtitle="Deep, high-contrast inks and saturated supporting neutrals" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 20px; }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-card); }
  .sw { flex: 1; height: 108px; display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; }
  .sw span { font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.04em; text-transform: uppercase; }
  .sw small { font-family: var(--font-mono); font-size: 0.56rem; opacity: 0.7; margin-top: 3px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--nx-ink);color:#f4f7ff"><span>Ink</span><small>#0b1020</small></div>
    <div class="sw" style="background:var(--nx-dusty);color:#f4f7ff"><span>Dusty</span><small>#1a2340</small></div>
    <div class="sw" style="background:var(--nx-body);color:#f4f7ff"><span>Body</span><small>#24335c</small></div>
    <div class="sw" style="background:var(--nx-sign);color:#f4f7ff"><span>Sign</span><small>#2f4580</small></div>
    <div class="sw" style="background:var(--nx-muted);color:#0b1020"><span>Muted</span><small>#5d7bd4</small></div>
    <div class="sw" style="background:var(--nx-oat);color:#0b1020"><span>Oat</span><small>#d6e1ff</small></div>
  </div>
</body>
</html>
